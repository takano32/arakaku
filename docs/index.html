<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unofficial ARAKAKU Database</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="github-ribbon-container">
    <a href="https://github.com/takano32/arakaku" class="github-ribbon" target="_blank" rel="noopener">GitHub</a>
  </div>
  <header class="site-header">
    <div>
      <h1>Unofficial ARAKAKU Database</h1>
      <p>アラカク非公式データベース</p>
    </div>
  </header>

  <main>
    <section class="summary-grid" id="summary"></section>

    <section class="toolbar">
      <div class="search-wrap">
        <input id="search" type="search" placeholder="選手名・大会名・団体名・王座で検索">
        <button type="button" id="search-clear" class="search-clear" aria-label="検索をクリア" hidden>✕</button>
      </div>
    </section>

    <div class="tab-toolbar">
      <nav class="tabs" aria-label="表示切替">
        <button type="button" class="tab active" data-tab="bouts">試合</button>
        <button type="button" class="tab" data-tab="fighters">選手</button>
        <button type="button" class="tab" data-tab="events">大会</button>
        <button type="button" class="tab" data-tab="promotions">団体</button>
        <button type="button" class="tab" data-tab="titles">王座</button>
        <button type="button" class="tab" data-tab="videos">動画</button>
      </nav>
      <div class="view-mode-switch" aria-label="表示モード切替"></div>
    </div>

    <section id="mention-filters" class="mention-filters" hidden>
      <select id="mention-type-filter" aria-label="言及種別で絞り込み">
        <option value="">すべての言及</option>
      </select>
    </section>

    <!-- ボタンは filters.js の TAB_FILTERS からアクティブタブに応じて ViewController が生成 -->
    <section id="tab-filters" class="tab-filters" hidden></section>

    <section id="content" class="content"></section>
  </main>

  <footer>
    <p>
      <a href="https://kobayashi856.github.io/arakaku-site/" target="_blank" rel="noopener">公式サイト</a>
      /
      <a href="https://note.com/xyz1090" target="_blank" rel="noopener">アラカク通信のーと</a>
      /
      <a href="https://www.youtube.com/@%E3%82%A2%E3%83%A9%E3%82%AB%E3%82%AF%E9%80%9A%E4%BF%A1" target="_blank" rel="noopener">YouTube</a>
    </p>
  </footer>

  <dialog id="keyboard-help">
    <h2>キーボードショートカット</h2>
    <table>
      <tbody>
        <tr><td><kbd>j</kbd> / <kbd>↓</kbd></td><td>次のアイテムへ</td></tr>
        <tr><td><kbd>k</kbd> / <kbd>↑</kbd></td><td>前のアイテムへ</td></tr>
        <tr><td><kbd>g</kbd></td><td>リスト先頭へ</td></tr>
        <tr><td><kbd>G</kbd></td><td>リスト末尾へ</td></tr>
        <tr><td><kbd>Enter</kbd></td><td>アイテムを開く</td></tr>
        <tr><td><kbd>o</kbd></td><td>詳細を展開/折りたたむ</td></tr>
        <tr><td><kbd>Space</kbd></td><td>半ページ下スクロール</td></tr>
        <tr><td><kbd>Shift+Space</kbd></td><td>半ページ上スクロール</td></tr>
        <tr><td><kbd>/</kbd></td><td>検索ボックスへ</td></tr>
        <tr><td><kbd>h</kbd> / <kbd>l</kbd></td><td>前/次のタブへ</td></tr>
        <tr><td><kbd>1</kbd>〜<kbd>8</kbd></td><td>タブ直接切り替え</td></tr>
        <tr><td><kbd>c</kbd></td><td>現在のURLをコピー</td></tr>
        <tr><td><kbd>r</kbd></td><td>再読み込み</td></tr>
        <tr><td><kbd>Esc</kbd></td><td>検索をクリア / ヘルプを閉じる</td></tr>
        <tr><td><kbd>?</kbd></td><td>このヘルプを表示</td></tr>
      </tbody>
    </table>
    <button type="button" id="keyboard-help-close">閉じる</button>
  </dialog>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
